<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>New User</title>
        <style>
            {wrapper}
        </style>
    </head>
    <body style="width:100%; min-height: 100dvh; background-color: #e3e3e3; padding:0; margin:0; font-family: Arial, Helvetica, sans-serif;">
        <div class="wrapper" style="width: 60%;min-height:170px; height: max-content; background-color: #2b2745; color: white; margin: 0 auto; overflow: hidden; line-height: 1.3em;">
            <div style="width: 80%; margin: 0 auto; margin-top: 30px;">
                <img src="http://{host}{logo}" alt="" style="width: 120px;">
            </div>
            <h3 style="font-size: 30px; margin: auto; text-align: center;margin-top: 30px;">New User Account</h3>
            <div style="width: 100%; min-height:70vh; margin-top: 40px; background-color: #ffffff; padding: 10px; color: #2b2745;">
                <h3 style="width: 80%; margin: 0 auto; margin-top: 30px;">Hello {user_name}</h3>
                <p style="font-size: 14px; width: 80%; margin: 0 auto; margin-top: 30px;">
                    {company} has created a user account for you. To access the content of
                    the sysem, visit <a href="http://{host}/auth/login" style="color: #ff6a00;">{host}</a> and provide the credentials below to login.
                </p>
                <div style="margin-top: 30px;">
                    <table style="border-collapse: collapse; border: 1px gray solid; margin: 0 auto; width: 80%; font-size: 12px;">
                        <tbody>
                            <tr>
                                <td style="border-right: 1px gray solid; border-bottom: 1px gray solid; padding: 5px; font-weight: bold; width: 50%;">User Email</td>
                                <td style="border-bottom: 1px gray solid; padding: 5px;">{email}</td>
                            </tr>
                            <tr>
                                <td style="border-right: 1px gray solid; padding: 5px; font-weight: bold;">User Password</td>
                                <td style="border-bottom: 1px gray solid; padding: 5px;">{password}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div style="width:80%; text-align: center; margin: 0 auto; margin-top: 40px;">
                    <a href="http://{host}/auth/login" style="margin: 0 auto; background-color: #2b2745; color: white; padding: 10px; text-align: center;text-decoration: none; border-radius: 5px; font-size: 13px;">Click here to login</a>
                </div>
            </div>
            <div style="width: 100%; margin: 0 auto; background-color: white; height: 10vh; color: #2b2745;">
                <div style="width: 80%; margin: 0 auto; border-top: 1px gray solid; padding-top: 5px; display: grid; grid-template-columns: 1fr 2fr;">
                    <div style="font-size: 12px; display: grid; grid-template-columns: 1fr 1fr;">
                        <div style="margin: auto 0;"> Powered by</div>
                        <a href="http://startapperp.com" style="margin: auto 0;"><img src="http://startapperp.com:8000/static/images/logo/logo.svg" alt="" style="width: 70px; margin-top: 10px;"></a>
                    </div>
                    <div style="font-size: 12px; margin-top: 2px; text-align: right;">&copy; 2024 | All Rights Reserved</div>
                </div>
            </div>
        </div>
    </body>
    </html>
