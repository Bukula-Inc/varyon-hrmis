<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Onboarding Video Modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200 min-h-screen flex items-center justify-center">

<div class="relative w-full max-w-6xl h-[600px]">

  <!-- LEFT PANEL -->
  <div class="absolute left-0 top-0 bottom-0 w-[40%] bg-indigo-950 text-white rounded-3xl p-10 flex flex-col justify-between">

    <div>
      <h2 class="text-lg mb-10">Ξ3cket</h2>

      <h1 class="text-4xl font-bold mb-6 leading-tight">
        Let’s get <br> you started!
      </h1>

      <p class="text-gray-300 text-sm mb-8 max-w-sm">
        Please fill in a few details so we can get back to you.
      </p>

      <!-- Tooltip Button -->
      <div class="relative">
        <div class="flex items-center gap-3 bg-indigo-900 px-5 py-3 rounded-xl w-max shadow-lg">
          <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">▶</div>
          <span class="text-sm">What happens when you send in these details?</span>
        </div>

        <!-- Arrow line -->
        <div class="absolute left-1/2 top-full mt-6 w-20 h-20 border-l border-b border-gray-400 rounded-bl-full opacity-40"></div>
      </div>
    </div>

    <div class="text-sm text-gray-400 space-y-2">
      <p>Already have an account? <span class="text-white underline">Sign in</span></p>
      <p class="text-indigo-300">Need help?</p>
    </div>
  </div>


  <!-- VIDEO MODAL -->
  <div class="absolute right-0 top-1/2 -translate-y-1/2 w-[75%]">

    <div class="bg-white rounded-3xl shadow-2xl p-4">

      <!-- Video Container -->
      <div class="relative rounded-2xl overflow-hidden">

        <!-- Close Button -->
        <button class="absolute top-4 right-4 text-white/80 hover:text-white text-xl z-10">
          ✕
        </button>

        <!-- Video -->
        <img 
          src="https://images.unsplash.com/photo-1607746882042-944635dfe10e"
          class="w-full h-[400px] object-cover"
        />

        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/10"></div>

        <!-- Bottom Info -->
        <div class="absolute bottom-4 left-4 text-white text-sm">
          <p class="font-semibold">Jennifer Smith</p>
          <p class="text-xs opacity-80">Head of Sales</p>
        </div>

        <!-- Subtitle -->
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white text-sm opacity-90">
          We appreciate your interest in knowing more about 3cket
        </div>

        <!-- Play/Pause -->
        <button class="absolute bottom-4 right-4 w-10 h-10 bg-white/80 rounded-full flex items-center justify-center">
          ❚❚
        </button>

      </div>

    </div>

  </div>

</div>

</body>
</html>
