<div class=" flex items-end justify-between sm:flex items-end h-[max-content] mb-5">
    {% include 'client_app/components/navigators.html' %}
    <!-- RIGHT ACTIONS -->
    <div class=" page-actions-wrapper flex items-center justify-center ">
        <!-- actions for the list view -->
        <div class="content-group list-view-content flex items-center justify-center">
            <select type="select" action-type="multi-content-toggler" class="lite-selector border rounded-md px-3 w-[230px] mr-2" placeholder="Toggle Content">
                <option value="Currency" selected>Currency</option>
                <option value="Exchange Rate">Exchange Rate</option>
            </select>
            <div for="Currency" class="multi-content-group">
                <button class="new-action-btn h-[47px] text-16 w-[170px] btn bg-default text-theme_text_color shadow-md mr-2">
                    <i data-lucide="plus-circle" class="w-[17px] h-[17px] mr-2"></i>
                    New Currency
                </button>
            </div>
            <div for="Exchange Rate" class="multi-content-group">
                <button class="new-action-btn h-[47px] text-16 w-[200px] btn bg-default text-theme_text_color shadow-md mr-2">
                    <i data-lucide="plus-circle" class="w-[17px] h-[17px] mr-2"></i>
                    New Exchange Rate
                </button>
            </div>
        </div>
        
        <!-- actions for the form --> 
        <div class="content-group info-view-content new-form-view-content form-content-view info-actions flex items-center justify-center hidden"></div>
    </div>
</div>
