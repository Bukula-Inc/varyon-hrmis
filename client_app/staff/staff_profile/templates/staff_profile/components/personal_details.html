{% load static %}
<div class="-2 intro-y h-full">
    <div class="box p-3 h-full">
        <div class="w-full flex items-center justify-between">
            <h4 class="text-lg font-semibold text-slate-700">Personal Details</h4>
            <button class="text-blue-500 text-sm font-medium hover:underline">Save Changes</button>
        </div>
        <div class="my-2 bg-gray-200 w-full h-[3px] rounded-full"></div>
        <div class="grid grid-rows-5 gap-4">
            <!-- Profile Picture -->
            <div class="row-span-1 flex justify-center items-center">
                <img src="/media/defaults/avatas/dp.jpeg" alt="Profile Picture" class="rounded-full w-24 h-24 object-cover">
            </div>
            
            <!-- Editable Form Fields -->
            <div class="row-span-4 ">
                <form id="personal-info-fields-wrapper" class="text-sm text-slate-700 grid grid-cols-2 gap-y-2">
                   
                </form>
            </div>
        </div>
    </div>
</div>
