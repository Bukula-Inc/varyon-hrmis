{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static '/images/logo/emblem_white.svg' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Varyon is built to simplify your business complexity">
    <meta name="keywords" content="zambia erp accounting hr payroll">
    <meta name="author" content="Probase Limited">
    <title>{% block title %} {% endblock %} || Varyon ERP</title>
    <script src="{% static '/js/tailwindcss.js' %}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.1/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper@8/swiper-bundle.min.css">
    <link rel="stylesheet" href="{% static '/css/app.css' %}" />
    <link rel="stylesheet" href="{% static '/css/summernote/summernote.css' %}" />
    <link rel="stylesheet" href="{% static '/css/custom.css' %}" />
    <link rel="stylesheet" href="{% static '/css/custom_select.css' %}" />
    <link rel="stylesheet" href="{% static '/css/table.css' %}" />
    <link rel="stylesheet" href="{% static '/css/animations.css' %}" />
    <link rel="stylesheet" href="{% static '/css/web.css' %}" />
    <link rel="stylesheet" href="{% static '/css/hilight.css' %}" />
    <link rel="stylesheet" href="{% static '/css/swiper.css' %}" />
</head>
<body class="bg-white">
    <div class="w-full min-h-screen h-max-content bg-gray-200 lg:xl:rounded-t-[20px]">
        {% include "./components/nav.html" %}
        {% block content %} {% endblock %}
    </div>
    {% include "./components/footer.html" %}
    {% include "client_app/web_scripts.html" %}

    {% comment %} <script src="{% static '/js/app.js' %}"></script>
    <script src="{% static '/js/jquery.js' %}"></script>
    <script src="{% static '/js/connection/axios.js' %}"></script>
    <script src="{% static '/js/apex.js' %}"></script>
  
    <script src="/static/js/lite.js"></script>
    <script type="module" src="{% static '/js/main.js' %}"></script>
    <script src="{% static '/js/tailwindconfig.js' %}"></script> {% endcomment %}
    
    
</body>
</html>
