<div class="w-full max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-6 mt-16">
    <!-- Company Name -->
    <h1 id="job-company" class="text-3xl font-bold text-center text-gray-800 mb-4">Company Name</h1>

    <div class="border-b pb-4">
        <h2 id="job-title" class="text-2xl font-semibold text-gray-700">Job Title</h2>
        <p id="job-designation" class="text-lg text-gray-600 mt-1">Designation</p>
    </div>
    <div class="flex items-center justify-between border-b py-4">
        <h4 class="text-xl font-semibold text-gray-700">Salary:</h4>
        <p id="job-salary" class="text-lg text-gray-600">Not Specified</p>
    </div>
    <div class="py-4">
        <h4 class="text-lg font-semibold text-gray-700"></h4>
        <p id="job-description" class="text-gray-600 mt-2">Loading...</p>
    </div>
    <div id="job-career-application-info" class="w-full py-4"></div>

    <div class="w-full flex justify-center mt-6">
        <button id="apply-for-job" class="bg-default hover:default text-white font-semibold py-2 px-6 rounded-md shadow-md transition-all">
            Apply Now
        </button>
    </div>
</div>
