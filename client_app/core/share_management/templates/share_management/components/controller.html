<div class=" flex items-end justify-between sm:flex items-end h-[max-content] mb-5">
    {% include 'client_app/components/navigators.html' %}
    <!-- TITLE CONTENT -->
    <!-- RIGHT ACTIONS -->
    <div class=" page-actions-wrapper flex items-center justify-center ">
        <!-- actions for the list view -->
        <div class="content-group list-view-content flex items-center justify-center">
            <select type="select" action-type="multi-content-toggler" class="lite-selector border rounded-md px-3 w-[220px] mr-3" placeholder="Select Content Type">
                <option value="Share Type">Share Type</option>
                <option value="Shareholder" selected>Shareholder</option>
                <option selected value="Shares">Shares</option>
            </select>
            <div class="content-group list-view-content">
                <div for="Share Type" class="multi-content-group w-full intro-x">
                    <button class="new-action-btn h-[47px] text-16 w-max btn bg-default text-theme_text_color shadow-md mr-2">
                        <i data-lucide="plus-circle" class="w-[17px] h-[17px] mr-2"></i> New Share Type
                    </button>
                </div>
                <div for="Shareholder" class="multi-content-group w-full intro-x">
                    <button class="new-action-btn h-[47px] text-16 w-max  btn bg-default text-theme_text_color shadow-md mr-2">
                        <i data-lucide="plus-circle" class="w-[17px] h-[17px] mr-2"></i> New Shareholder
                    </button>
                </div>
                <div for="Shares" class="multi-content-group w-full intro-x">
                    <button class="new-action-btn h-[47px] text-16 w-max  btn bg-default text-theme_text_color shadow-md mr-2">
                        <i data-lucide="plus-circle" class="w-[17px] h-[17px] mr-2"></i> Define Shares
                    </button>
                </div>
            </div>
        </div>
        
        <!-- actions for the form --> 
        <div class="content-group info-view-content new-form-view-content form-content-view info-actions flex items-center justify-center hidden"></div>
    </div>
</div>
