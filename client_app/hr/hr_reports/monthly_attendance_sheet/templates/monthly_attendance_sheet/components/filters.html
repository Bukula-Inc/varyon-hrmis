<div class=" report-filters-wrapper w-full my-2 mt-5 bg-white rounded-md border intro-y p-3 grid grid-cols-6 gap-2">
  <div class="relative w-full">
        <small class="text-gray-500 text-10">Month</small>
        <select field-name="currency" data-placeholder="Select Month"
            class="tom-select w-full rounded-full text-[11px] text-gray-800 border-none" aria-placeholder="Currency">
            <option value="0">Sep</option>
            <option value="1">Oct</option>
            <option value="2">Nov</option>
            <option value="3">Dec</option>
        </select>
    </div>
  <div class="relative w-full">
        <small class="text-gray-500 text-10">Year</small>
        <select field-name="currency" data-placeholder="Select Year"
            class="tom-select w-full rounded-full text-[11px] text-gray-800 border-none" aria-placeholder="Currency">
            <option value="0">2023</option>
            <option value="1">2024</option>
            <option value="2">2025</option>
            <option value="3">2026</option>
        </select>
    </div>
    <div class="relative w-full">
        <small class="text-gray-500 text-10">Company</small>
        <select field-name="accounting_period" data-placeholder="Company" class="tom-select w-full rounded-full text-[11px] text-gray-800 border-none"
            aria-placeholder="Account Type">
            <option value="0">Probase</option>
                   </select>
    </div>
    <div class="relative w-full">
        <small class="text-gray-500 text-10">Employee</small>
        <select field-name="currency" data-placeholder="Select Employee"
            class="tom-select w-full rounded-full text-[11px] text-gray-800 border-none" aria-placeholder="Currency">
            <option value="0">Kakuhu</option>
            <option value="1">Bruce</option>
            <option value="2">Bright</option>
            <option value="3">Christine</option>
        </select>
    </div>
    <div class="relative w-full">
        <small class="text-gray-500 text-10">Group By</small>
        <select field-name="account_type" data-placeholder="Group By"
            class="tom-select w-full rounded-full text-[11px] text-gray-800 border-none"
            aria-placeholder="Status">
            <option selected value="0">Branch</option>
            <option value="Draft">Grade</option>
            <option value="Paid">Department</option>
            <option value="Unpaid">Designation</option>
         
            
        </select>
    </div>
   
   
</div>
